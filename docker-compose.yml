services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  openclaw:
    image: ghcr.io/openclaw/openclaw:main
    container_name: openclaw
    ports:
      - "18789:18789"
      - "18791:18789"
    volumes:
      - ./.openclaw-data:/home/node/.openclaw
      - ./config/workspace:/home/node/.openclaw/workspace
      - ./config/openclaw.json:/home/node/.openclaw/openclaw.json
      - ./skills/test-specialist:/app/skills/test-specialist
      - ./skills/qa-bug-investigation:/app/skills/qa-bug-investigation
      - ./skills/self-improving:/app/skills/self-improving
      - C:/Users/Administrator/Workspace/lukeware/clawdevs-ai/control-panel/frontend:/home/node/.openclaw/projects/frontend
      - C:/Users/Administrator/Workspace/lukeware/clawdevs-ai/control-panel/backend:/home/node/.openclaw/projects/backend
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OPENCLAW_GATEWAY_TOKEN=clawdevs_ai
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
    driver: local