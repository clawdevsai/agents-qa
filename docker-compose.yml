services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  openclaw:
    image: ghcr.io/openclaw/openclaw:main
    container_name: openclaw
    ports:
      - "18789:18789"
      - "18791:18789"
    volumes:
      - ./.openclaw-data:/home/node/.openclaw
      - ./config/workspace:/home/node/.openclaw/workspace
      - ./config/openclaw.json:/home/node/.openclaw/openclaw.json
      - ./skill-test-specialist:/app/skills/test-specialist
      - ./projects:/home/node/.openclaw/projects
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OPENCLAW_GATEWAY_TOKEN=clawdevs_ai
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
    driver: local