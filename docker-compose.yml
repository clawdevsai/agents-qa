services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  openclaw:
    build:
      context: .
      dockerfile_inline: |
        FROM ghcr.io/openclaw/openclaw:main
        USER root
        RUN apt-get update && apt-get install -y \
          libnspr4 libnss3 libx11-xcb1 libxrandr2 libxcomposite1 libxcursor1 \
          libxdamage1 libxfixes3 libxi6 libgtk-3-0 libgdk-pixbuf2.0-0 libatk1.0-0 \
          libasound2 libdbus-1-0 \
          && rm -rf /var/lib/apt/lists/*
        USER node
    image: openclaw-with-browser-deps:local
    container_name: openclaw
    ports:
      - "18789:18789"
      - "18791:18789"
    volumes:
      - ./.openclaw-data:/home/node/.openclaw
      - ./config/workspace:/home/node/.openclaw/workspace
      - ./config/openclaw.json:/home/node/.openclaw/openclaw.json
      - ./skills/test-specialist:/app/skills/test-specialist
      - ./skills/qa-bug-investigation:/app/skills/qa-bug-investigation
      - ./skills/self-improving:/app/skills/self-improving
      - ./projects:/home/node/.openclaw/projects
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OPENCLAW_GATEWAY_TOKEN=clawdevs_ai
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
    driver: local